name: Desktop Build

on:
  push:
    branches: [main]
    paths:
      - 'prompt-lab-desktop/**'
      - 'prompt-lab-extension/src/**'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: prompt-lab-macos
          - platform: ubuntu-22.04
            artifact: prompt-lab-linux
          - platform: windows-latest
            artifact: prompt-lab-windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: prompt-lab-desktop/src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install extension dependencies
        working-directory: prompt-lab-extension
        run: npm ci

      - name: Install desktop dependencies
        working-directory: prompt-lab-desktop
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build desktop app
        working-directory: prompt-lab-desktop
        run: cargo tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            prompt-lab-desktop/src-tauri/target/release/bundle/**/*.dmg
            prompt-lab-desktop/src-tauri/target/release/bundle/**/*.app
            prompt-lab-desktop/src-tauri/target/release/bundle/**/*.deb
            prompt-lab-desktop/src-tauri/target/release/bundle/**/*.AppImage
            prompt-lab-desktop/src-tauri/target/release/bundle/**/*.exe
            prompt-lab-desktop/src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: warn
