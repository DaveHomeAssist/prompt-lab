<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../assets/icons/favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/icons/favicon/favicon-16.png">

  ║  UI ISSUES TABLE — Prompt Lab                                   ║
  ║                                                                ║

  ║              UI_ISSUES_TABLE_TEMPLATE.html                      ║
  ║                                                                ║
  ║  AGENT UPDATE INSTRUCTIONS:                                    ║
  ║  1. Issues live in the <script id="issue-data"> JSON block     ║
  ║  2. To add an issue: append to the JSON array                  ║
  ║  3. To resolve: change "status" to "done", add "resolved" date ║
  ║  4. To defer: change "status" to "deferred"                    ║
  ║  5. Update data-last-verified on <main> after any review       ║
  ║  6. Do NOT edit the HTML card markup — it renders from JSON    ║
  ╚══════════════════════════════════════════════════════════════════╝

<title>Prompt Lab — UI Issues Tracker</title>
<style>
  @font-face {
    font-family: 'Outfit';
    src: url('./fonts/outfit.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('./fonts/jetbrains-mono.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg: #020617;
    --surface: #0f172a;
    --surface-2: #162033;
    --surface-3: #1e293b;
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.14);
    --text: #e2e8f0;
    --text-soft: #cbd5e1;
    --text-muted: #94a3b8;
    --violet: #7c3aed;
    --violet-soft: rgba(124,58,237,0.14);
    --violet-line: rgba(124,58,237,0.3);
    --teal: #2dd4bf;
    --teal-soft: rgba(45,212,191,0.12);
    --teal-line: rgba(45,212,191,0.28);
    --amber: #f59e0b;
    --amber-soft: rgba(245,158,11,0.12);
    --amber-line: rgba(245,158,11,0.28);
    --red: #ef4444;
    --red-soft: rgba(239,68,68,0.12);
    --red-line: rgba(239,68,68,0.28);
    --gray-soft: rgba(148,163,184,0.12);
    --gray-line: rgba(148,163,184,0.24);
    --sans: 'Outfit', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    color: var(--text);
    line-height: 1.6;
    background:
      radial-gradient(circle at top left, rgba(124,58,237,0.16), transparent 28%),
      radial-gradient(circle at bottom right, rgba(45,212,191,0.1), transparent 24%),
      var(--bg);
    min-height: 100vh;
  }

  .skip-link {
    position: absolute;
    top: -48px;
    left: 0;
    background: var(--teal);
    color: #001018;
    padding: .5rem 1rem;
    font-size: .85rem;
    font-weight: 600;
    z-index: 9999;
    border-radius: 0 0 8px 0;
    text-decoration: none;
    transition: top .15s;
  }
  .skip-link:focus { top: 0; }

  .os-nav {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(2,6,23,0.92);
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 0;
    justify-content: center;
    padding: 0;
    backdrop-filter: blur(12px);
    font-family: var(--mono);
    font-size: .68rem;
  }
  .os-nav a {
    color: rgba(226,232,240,0.62);
    text-decoration: none;
    padding: .6rem .85rem;
    letter-spacing: .04em;
    transition: color .15s, background .15s;
    white-space: nowrap;
  }
  .os-nav a:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .os-nav a.active { color: #fff; border-bottom: 2px solid var(--violet); }
  .os-nav .bridge { margin-left: auto; opacity: .7; }

  .wrap { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 1rem; }
  header { margin-bottom: 1.75rem; }
  .eyebrow {
    font-family: var(--mono);
    font-size: .7rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: .5rem;
  }
  h1 {
    font-size: clamp(1.75rem, 3vw, 2.4rem);
    font-weight: 650;
    letter-spacing: -.03em;
    margin-bottom: .4rem;
  }
  .subtitle { color: var(--text-muted); font-size: .98rem; max-width: 720px; }
  .stats { display: flex; gap: 1.5rem; margin-top: 1.25rem; flex-wrap: wrap; }
  .stat {
    display: flex;
    align-items: center;
    gap: .5rem;
    font-family: var(--mono);
    font-size: .75rem;
    letter-spacing: .04em;
  }
  .stat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-done { background: var(--teal); }
  .dot-partial { background: var(--amber); }
  .dot-open { background: var(--red); }
  .dot-deferred { background: var(--text-muted); }

  .filter-bar {
    display: flex;
    gap: .4rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar .label {
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-right: .25rem;
  }
  .fbtn {
    font-family: var(--mono);
    font-size: .68rem;
    letter-spacing: .04em;
    padding: .34rem .72rem;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--text-soft);
    cursor: pointer;
    transition: all .15s;
  }
  .fbtn:hover { border-color: var(--line-strong); color: var(--text); }
  .fbtn.active { background: var(--violet); color: #fff; border-color: var(--violet); }
  .fbtn:focus-visible { outline: 2.5px solid var(--teal); outline-offset: 2px; }

  .issue-group {
    background: rgba(15,23,42,0.82);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 1rem;
    box-shadow: 0 12px 28px rgba(2,6,23,.28);
  }
  .issue-group.is-hidden { display: none; }
  .group-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: .8rem 1rem;
    border: none;
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    font-size: .95rem;
    font-weight: 600;
    color: var(--text);
    text-align: left;
    transition: background .15s;
  }
  .group-toggle:hover { background: rgba(255,255,255,0.05); }
  .group-toggle:focus-visible { outline: 2.5px solid var(--teal); outline-offset: -2px; }
  .group-toggle .badge {
    font-family: var(--mono);
    font-size: .68rem;
    font-weight: 500;
    padding: .15rem .5rem;
    border-radius: 999px;
    letter-spacing: .06em;
  }
  .badge-done { background: var(--teal-soft); color: var(--teal); border: 1px solid var(--teal-line); }
  .badge-partial { background: var(--amber-soft); color: var(--amber); border: 1px solid var(--amber-line); }
  .badge-open { background: var(--red-soft); color: #fca5a5; border: 1px solid var(--red-line); }
  .badge-deferred { background: var(--gray-soft); color: var(--text-muted); border: 1px solid var(--gray-line); }
  .group-toggle .chev {
    font-size: .9rem;
    color: var(--text-muted);
    transition: transform .2s;
  }
  .issue-group.open .chev { transform: rotate(90deg); }
  .group-body { display: none; padding: .6rem; }
  .issue-group.open .group-body { display: block; }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: .7rem;
  }
  .issue-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: .7rem .85rem;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s, transform .15s;
    display: flex;
    flex-direction: column;
    gap: .34rem;
  }
  .issue-card:hover {
    border-color: var(--line-strong);
    box-shadow: 0 8px 18px rgba(2,6,23,.28);
    transform: translateY(-1px);
  }
  .issue-card:focus-visible { outline: 2.5px solid var(--teal); outline-offset: 2px; }
  .card-top {
    display: flex;
    align-items: center;
    gap: .5rem;
    justify-content: space-between;
  }
  .card-area {
    font-family: var(--mono);
    font-size: .65rem;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--teal);
  }
  .card-sev {
    font-family: var(--mono);
    font-size: .6rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: .1rem .42rem;
    border-radius: 999px;
  }
  .card-sev-P1 { color: #fff; background: var(--red); }
  .card-sev-P2 { color: var(--amber); background: var(--amber-soft); border: 1px solid var(--amber-line); }
  .card-sev-P3 { color: var(--text-muted); background: var(--gray-soft); border: 1px solid var(--gray-line); }
  .card-title { font-size: .9rem; font-weight: 500; line-height: 1.45; }
  .card-detail {
    display: none;
    margin-top: .42rem;
    padding-top: .45rem;
    border-top: 1px solid var(--line);
    font-size: .82rem;
  }
  .issue-card.expanded .card-detail { display: block; }
  .card-detail dt {
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: .35rem;
  }
  .card-detail dt:first-child { margin-top: 0; }
  .card-detail dd { color: var(--text-soft); margin-left: 0; }
  .card-detail code {
    font-family: var(--mono);
    font-size: .78rem;
    background: rgba(255,255,255,.04);
    padding: .08rem .3rem;
    border-radius: 4px;
  }
  .card-expand-hint {
    font-family: var(--mono);
    font-size: .6rem;
    color: var(--text-muted);
    letter-spacing: .04em;
    margin-top: .1rem;
  }
  .issue-card.expanded .card-expand-hint { display: none; }

  .status {
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    font-family: var(--mono);
    font-size: .62rem;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: .15rem .5rem;
    border-radius: 999px;
    white-space: nowrap;
  }
  .status-done { background: var(--teal-soft); color: var(--teal); border: 1px solid var(--teal-line); }
  .status-partial { background: var(--amber-soft); color: var(--amber); border: 1px solid var(--amber-line); }
  .status-open { background: var(--red-soft); color: #fca5a5; border: 1px solid var(--red-line); }
  .status-deferred { background: var(--gray-soft); color: var(--text-muted); border: 1px solid var(--gray-line); }

  .form-wrap { margin-top: 1.5rem; }
  .form-header {
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: .75rem;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .form-panel {
    background: rgba(15,23,42,0.82);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 1.25rem;
    box-shadow: 0 12px 28px rgba(2,6,23,.28);
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .form-grid .full { grid-column: 1 / -1; }
  .form-field { display: flex; flex-direction: column; gap: .25rem; }
  .form-field label {
    display: block;
    font-family: var(--mono);
    font-size: .68rem;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: .3rem;
  }
  .form-field input, .form-field select, .form-field textarea {
    width: 100%;
    font-family: var(--sans);
    font-size: .88rem;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: .58rem .68rem;
    transition: border-color .15s, box-shadow .15s;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
    outline: none;
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(45,212,191,.15);
  }
  .form-field textarea { resize: vertical; min-height: 72px; }
  .form-actions { display: flex; align-items: center; gap: .75rem; margin-top: .85rem; }
  .btn-submit {
    font-family: var(--sans);
    font-size: .9rem;
    font-weight: 600;
    color: #fff;
    background: var(--violet);
    border: none;
    border-radius: 999px;
    padding: .56rem 1.3rem;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .btn-submit:hover { background: #6d28d9; transform: translateY(-1px); }
  .btn-submit:focus-visible { outline: 3px solid var(--teal); outline-offset: 3px; }
  .form-msg { font-family: var(--mono); font-size: .72rem; opacity: 0; transition: opacity .2s; }
  .form-msg.visible { opacity: 1; }
  .del-btn {
    background: none;
    border: none;
    color: #fca5a5;
    cursor: pointer;
    font-size: .75rem;
    padding: .15rem .4rem;
    border-radius: 4px;
    font-family: var(--mono);
    transition: background .15s;
  }
  .del-btn:hover { background: var(--red-soft); }

  .os-footer {
    background: rgba(2,6,23,0.92);
    color: rgba(226,232,240,.56);
    text-align: center;
    padding: 1.25rem 1rem;
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .06em;
    border-top: 1px solid var(--line);
    margin-top: 2.5rem;
  }
  .os-footer a { color: rgba(226,232,240,.72); text-decoration: none; }
  .os-footer a:hover { color: var(--text); }

  @media (max-width: 700px) {
    body { font-size: .92rem; }
    .wrap { padding: 1rem .75rem .75rem; }
    .card-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    .os-nav { font-size: .58rem; overflow-x: auto; justify-content: flex-start; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
</style>
</head>

<main id="main" data-last-verified="2026-03-22">
<div class="wrap">
  <header>
    <div class="eyebrow" id="eyebrow"></div>
    <h1>Active UI Issues</h1>
    <p class="subtitle" id="subtitle"></p>
    <div class="stats" id="stats">
      <div class="stat"><span class="stat-dot dot-done"></span> <span id="stat-done">0</span> verified fixed</div>
      <div class="stat"><span class="stat-dot dot-partial"></span> <span id="stat-partial">0</span> follow-up</div>
      <div class="stat"><span class="stat-dot dot-open"></span> <span id="stat-open">0</span> open</div>
      <div class="stat"><span class="stat-dot dot-deferred"></span> <span id="stat-deferred">0</span> deferred</div>
      <div class="stat" style="color:var(--text-muted)"><span id="stat-total">0</span> tracked</div>
    </div>
  </header>
  <div class="filter-bar" role="group" aria-label="Filter issues" id="filterBar"></div>
  <div id="groups"></div>
  <div class="form-wrap">
    <div class="form-header">Report a UI Issue</div>
    <form class="form-panel" id="issueForm">
      <div class="form-grid">
        <div class="form-field">
          <label for="f-area">Area</label>
          <select id="f-area" required></select>
        </div>
        <div class="form-field">
          <label for="f-surface">Surface</label>
          <select id="f-surface" required>
            <option value="">Select...</option>
            <option value="global">Global</option>
            <option value="create">Create</option>
            <option value="library">Library</option>
            <option value="experiments">Experiments</option>
            <option value="connection">Connection</option>
            <option value="composer">Composer</option>
          </select>
        </div>
        <div class="form-field full">
          <label for="f-location">Location</label>
          <input id="f-location" type="text" placeholder="e.g. Create toolbar, Library card row">
        </div>
        <div class="form-field full">
          <label for="f-issue">Issue</label>
          <input id="f-issue" type="text" placeholder="Describe the issue clearly" required>
        </div>
        <div class="form-field full">
          <label for="f-impact">Impact on User</label>
          <textarea id="f-impact" rows="2" placeholder="How does this affect the experience?"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-submit">Add Issue</button>
        <span class="form-msg" id="formMsg"></span>
      </div>
    </form>
  </div>
</div>
</main>
<footer class="os-footer" id="footerEl"></footer>

    area:         string  — category tag (e.g. "Navigation", "Layout")

<script>
(function() {
  'use strict';

  var dataEl = document.getElementById('issue-data');
  var config = JSON.parse(dataEl.textContent);
  var issues = config.issues || [];

  // Escape HTML
  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, function(c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // Config: header
  document.getElementById('eyebrow').textContent = config.project + ' \u00b7 UI Audit Tracker \u00b7 Updated ' + (document.getElementById('main').getAttribute('data-last-verified') || '');
  document.getElementById('subtitle').textContent = config.subtitle || '';
  document.title = config.project + ' \u2014 UI Issues Tracker';

  // Config: nav
  var navBar = document.getElementById('navBar');
  (config.navLinks || []).forEach(function(link) {
    var a = document.createElement('a');
    a.href = link.href;
    a.textContent = link.label;
    if (link.active) a.className = 'active';
    if (link['class']) a.className = (a.className ? a.className + ' ' : '') + link['class'];
    navBar.appendChild(a);
  });

  // Config: area options in form
  var areaSelect = document.getElementById('f-area');
  var opt0 = document.createElement('option');
  opt0.value = '';
  opt0.textContent = 'Select...';
  areaSelect.appendChild(opt0);
  (config.areaOptions || []).forEach(function(area) {
    var o = document.createElement('option');
    o.value = area;
    o.textContent = area;
    areaSelect.appendChild(o);
  });

  // Config: footer
  document.getElementById('footerEl').innerHTML =
    esc(config.project) + ' \u00b7 UI Issues Tracker \u00b7 Updated ' +
    esc(document.getElementById('main').getAttribute('data-last-verified') || '') + ' \u00b7 ' +
    '<a href="' + esc((config.navLinks || [{}])[0].href || './index.html') + '">Back to ' + esc(config.project) + '</a>';

  // Group issues by status
  var STATUS_ORDER = ['done', 'open', 'partial', 'deferred'];
  var STATUS_LABELS = { done: 'Verified Fixed', open: 'Open', partial: 'Needs Verification / Follow-up', deferred: 'Deferred / Planned' };
  var STATUS_BADGE = { done: 'badge-done', open: 'badge-open', partial: 'badge-partial', deferred: 'badge-deferred' };
  var STATUS_CSS = { done: 'status-done', open: 'status-open', partial: 'status-partial', deferred: 'status-deferred' };
  var STATUS_TEXT = { done: 'Fixed', open: 'Open', partial: 'Follow-up', deferred: 'Deferred' };

  var grouped = {};
  STATUS_ORDER.forEach(function(s) { grouped[s] = []; });
  issues.forEach(function(issue) {
    var s = issue.status || 'open';
    if (!grouped[s]) grouped[s] = [];
    grouped[s].push(issue);
  });

  // Build filter bar
  var filterBar = document.getElementById('filterBar');
  var allFilters = [
    { key: 'all', label: 'All' },
    { key: 'open', label: 'Open' },
    { key: 'partial', label: 'Follow-up' },
    { key: 'deferred', label: 'Deferred' }
  ];
  (config.toolFilters || []).forEach(function(tf) {
    allFilters.push({ key: 'tool:' + tf.key, label: tf.label });
  });

  var spanLabel = document.createElement('span');
  spanLabel.className = 'label';
  spanLabel.textContent = 'Show:';
  filterBar.appendChild(spanLabel);

  var activeFilter = 'all';
  allFilters.forEach(function(f) {
    var btn = document.createElement('button');
    btn.className = 'fbtn' + (f.key === 'all' ? ' active' : '');
    btn.setAttribute('data-filter', f.key);
    btn.textContent = f.label;
    btn.addEventListener('click', function() {
      filterBar.querySelectorAll('.fbtn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = f.key;
      applyFilter();
    });
    filterBar.appendChild(btn);
  });

  // Render issue card
  function renderCard(issue) {
    var card = document.createElement('div');
    card.className = 'issue-card';
    card.tabIndex = 0;
    if (issue.tool) card.setAttribute('data-tool', issue.tool);

    var statusClass = STATUS_CSS[issue.status] || 'status-open';
    var statusText = STATUS_TEXT[issue.status] || issue.status;

    var topRight = '<span class="status ' + statusClass + '">' + esc(statusText) + '</span>';
    if (issue.severity && issue.status !== 'done') {
      topRight = '<span class="card-sev card-sev-' + esc(issue.severity) + '">' + esc(issue.severity) + '</span>';
    }

    var detailParts = [];

    // Status-specific primary label
    if (issue.status === 'done') {
      if (issue.impact) detailParts.push('<dt>Verified state</dt><dd>' + esc(issue.impact) + '</dd>');
      if (issue.location) detailParts.push('<dt>Location</dt><dd><code>' + esc(issue.location) + '</code></dd>');
      if (issue.fix) detailParts.push('<dt>What changed</dt><dd>' + esc(issue.fix) + '</dd>');
    } else if (issue.status === 'partial') {
      if (issue.impact) detailParts.push('<dt>Why follow-up</dt><dd>' + esc(issue.impact) + '</dd>');
      if (issue.location) detailParts.push('<dt>Location</dt><dd><code>' + esc(issue.location) + '</code></dd>');
    } else if (issue.status === 'deferred') {
      if (issue.impact) detailParts.push('<dt>Why deferred</dt><dd>' + esc(issue.impact) + '</dd>');
      if (issue.notes) detailParts.push('<dt>Source</dt><dd>' + esc(issue.notes) + '</dd>');
    } else {
      if (issue.impact) detailParts.push('<dt>Impact</dt><dd>' + esc(issue.impact) + '</dd>');
      if (issue.location) detailParts.push('<dt>Location</dt><dd><code>' + esc(issue.location) + '</code></dd>');
      if (issue.fix) detailParts.push('<dt>Fix</dt><dd>' + esc(issue.fix) + '</dd>');
    }
    if (issue.verification) detailParts.push('<dt>Verification</dt><dd>' + esc(issue.verification) + '</dd>');
    if (issue.notes && issue.status !== 'deferred') detailParts.push('<dt>Notes</dt><dd>' + esc(issue.notes) + '</dd>');
    if (issue.resolved) detailParts.push('<dt>Resolved</dt><dd>' + esc(issue.resolved) + '</dd>');

    card.innerHTML =
      '<div class="card-top"><span class="card-area">' + esc(issue.area || '') + '</span>' + topRight + '</div>' +
      '<div class="card-title">' + esc(issue.title) + '</div>' +
      '<div class="card-expand-hint">click to expand</div>' +
      '<dl class="card-detail">' + detailParts.join('') + '</dl>';

    card.addEventListener('click', function() { card.classList.toggle('expanded'); });
    card.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.classList.toggle('expanded'); }
    });
    return card;
  }

  // Render groups
  var groupsEl = document.getElementById('groups');
  STATUS_ORDER.forEach(function(status) {
    var items = grouped[status];

    var section = document.createElement('section');
    section.className = 'issue-group' + (status === 'done' || status === 'open' || status === 'partial' ? ' open' : '');
    section.setAttribute('data-status', status);

    var expanded = status === 'done' || status === 'open' || status === 'partial';
    var bodyContent = '';

    if (items.length === 0 && status === 'open') {
      bodyContent = '<p style="padding:.3rem .2rem;color:var(--text-muted);font-size:.88rem;">No active implementation issues are currently tracked as open. Remaining items are follow-up validation or deferred structural work.</p>';
    } else if (items.length === 0) {
      return;
    } else {
      bodyContent = '<div class="card-grid"></div>';
    }

    section.innerHTML =
      '<button class="group-toggle" type="button" aria-expanded="' + expanded + '">' +
        '<span>' + esc(STATUS_LABELS[status]) + ' (<span class="g-count">' + items.length + '</span>)</span>' +
        '<span style="display:flex;align-items:center;gap:.5rem">' +
          '<span class="badge ' + STATUS_BADGE[status] + ' g-count-badge">' + items.length + '</span>' +
          '<span class="chev">&rsaquo;</span>' +
        '</span>' +
      '</button>' +
      '<div class="group-body">' + bodyContent + '</div>';

    if (items.length > 0) {
      var grid = section.querySelector('.card-grid');
      items.forEach(function(issue) { grid.appendChild(renderCard(issue)); });
    }

    section.querySelector('.group-toggle').addEventListener('click', function() {
      var isOpen = section.classList.toggle('open');
      this.setAttribute('aria-expanded', String(isOpen));
    });

    groupsEl.appendChild(section);
  });

  // User submitted section
  var userSection = document.createElement('section');
  userSection.className = 'issue-group';
  userSection.id = 'userGroup';
  userSection.style.display = 'none';
  userSection.setAttribute('data-status', 'open');
  userSection.innerHTML =
    '<button class="group-toggle" type="button" aria-expanded="false">' +
      '<span id="userGroupTitle">User Submitted (0)</span>' +
      '<span style="display:flex;align-items:center;gap:.5rem"><span class="badge badge-open" id="userBadge">0</span><span class="chev">&rsaquo;</span></span>' +
    '</button>' +
    '<div class="group-body"><div class="card-grid" id="userBody"></div></div>';
  userSection.querySelector('.group-toggle').addEventListener('click', function() {
    var isOpen = userSection.classList.toggle('open');
    this.setAttribute('aria-expanded', String(isOpen));
  });
  groupsEl.appendChild(userSection);

  // Stats
  function updateStats() {
    document.getElementById('stat-done').textContent = (grouped.done || []).length;
    document.getElementById('stat-partial').textContent = (grouped.partial || []).length;
    document.getElementById('stat-open').textContent = (grouped.open || []).length;
    document.getElementById('stat-deferred').textContent = (grouped.deferred || []).length;
    document.getElementById('stat-total').textContent = issues.length;
  }
  updateStats();

  // Filter
  function applyFilter() {
    document.querySelectorAll('.issue-group').forEach(function(g) {
      var status = g.getAttribute('data-status');
      if (!status) return;

      if (activeFilter === 'all') {
        g.classList.remove('is-hidden');
        g.querySelectorAll('.issue-card').forEach(function(c) { c.style.display = ''; });
        return;
      }

      if (activeFilter.indexOf('tool:') === 0) {
        var toolKey = activeFilter.slice(5);
        var anyVisible = false;
        g.querySelectorAll('.issue-card').forEach(function(c) {
          var match = (c.getAttribute('data-tool') || '') === toolKey;
          c.style.display = match ? '' : 'none';
          if (match) anyVisible = true;
        });
        g.classList.toggle('is-hidden', !anyVisible);
      } else {
        var show = activeFilter === status;
        g.classList.toggle('is-hidden', !show);
        g.querySelectorAll('.issue-card').forEach(function(c) { c.style.display = ''; });
      }
    });
  }

  // User submission persistence
  var SKEY = config.storageKey || 'plb-ui-issues-user';
  function loadUser() { try { return JSON.parse(localStorage.getItem(SKEY) || '[]'); } catch(e) { return []; } }
  function saveUser(list) { try { localStorage.setItem(SKEY, JSON.stringify(list)); } catch(e) {} }
  var msgEl = document.getElementById('formMsg');
  function flash(text, color) {
    msgEl.textContent = text;
    msgEl.style.color = color || 'var(--teal)';
    msgEl.classList.add('visible');
    setTimeout(function() { msgEl.classList.remove('visible'); }, 2500);
  }

  function renderUserRows() {
    var userBody = document.getElementById('userBody');
    userBody.innerHTML = '';
    var items = loadUser();
    if (!items.length) { userSection.style.display = 'none'; return; }
    userSection.style.display = '';
    document.getElementById('userGroupTitle').textContent = 'User Submitted (' + items.length + ')';
    document.getElementById('userBadge').textContent = items.length;
    items.forEach(function(item, i) {
      var card = document.createElement('div');
      card.className = 'issue-card';
      card.tabIndex = 0;
      card.setAttribute('data-tool', item.surface || 'global');
      card.innerHTML =
        '<div class="card-top"><span class="card-area">' + esc(item.area) + '</span><span class="status status-open">Open</span></div>' +
        '<div class="card-title">' + esc(item.issue) + '</div>' +
        '<div class="card-expand-hint">click to expand</div>' +
        '<dl class="card-detail"><dt>Impact</dt><dd>' + esc(item.impact) + '</dd><dt>Location</dt><dd>' + esc(item.location) +
        '</dd><dt>Surface</dt><dd>' + esc(item.surface) +
        '</dd></dl><button class="del-btn" data-idx="' + i + '" title="Remove">&times; Remove</button>';
      card.addEventListener('click', function(e) { if (!e.target.closest('.del-btn')) card.classList.toggle('expanded'); });
      card.addEventListener('keydown', function(e) {
        if ((e.key === 'Enter' || e.key === ' ') && !e.target.closest('.del-btn')) {
          e.preventDefault();
          card.classList.toggle('expanded');
        }
      });
      userBody.appendChild(card);
    });
    document.querySelectorAll('#userBody .del-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var idx = parseInt(this.getAttribute('data-idx'), 10);
        var items = loadUser();
        var removed = items.splice(idx, 1)[0];
        saveUser(items);
        flash('Removed: ' + removed.area, 'var(--red)');
        renderUserRows();
      });
    });
  }

  document.getElementById('issueForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var area = document.getElementById('f-area').value.trim();
    var surface = document.getElementById('f-surface').value.trim();
    var issue = document.getElementById('f-issue').value.trim();
    var impact = document.getElementById('f-impact').value.trim();
    var location = document.getElementById('f-location').value.trim();
    if (!area || !surface || !issue) {
      flash('Area, surface, and issue are required', 'var(--red)');
      return;
    }
    var items = loadUser();
    items.push({
      area: area,
      surface: surface,
      issue: issue,
      impact: impact || 'Not specified',
      location: location || 'Not specified',
      date: new Date().toISOString().split('T')[0]
    });
    saveUser(items);
    this.reset();
    flash('Added: ' + area + ' issue');
    renderUserRows();
    userSection.classList.add('open');
    userSection.querySelector('.group-toggle').setAttribute('aria-expanded', 'true');
  });

  renderUserRows();
})();
</script>
